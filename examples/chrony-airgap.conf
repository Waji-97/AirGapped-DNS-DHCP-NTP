# Example chrony config for an air-gapped network with no external time source.
# This server becomes the local time authority; all other hosts sync to it.
#
# Replace /etc/chrony/chrony.conf with this (keep a backup), adjust the network
# range, then: systemctl restart chrony

# No upstream servers exist in an air-gapped network. Instead, trust this host's
# own hardware clock as a reference at stratum 10 -- low enough that any real
# upstream, if one is ever added, will immediately win.
local stratum 10

# Serve time to the LAN. Adjust to your subnet.
allow 10.0.0.0/24

# Standard chrony bookkeeping (these match Ubuntu's stock config).
driftfile /var/lib/chrony/chrony.drift
ntsdumpdir /var/lib/chrony
logdir /var/log/chrony
maxupdateskew 100.0
rtcsync
makestep 1 3
leapsectz right/UTC

# Optional: if the server has a GPS/PPS receiver or a PTP source, add it here
# and remove the `local stratum 10` line above -- a real reference clock is
# always better than a free-running system clock.
# refclock PPS /dev/pps0 lock NMEA
# refclock SHM 0 offset 0.5 delay 0.2 refid NMEA
