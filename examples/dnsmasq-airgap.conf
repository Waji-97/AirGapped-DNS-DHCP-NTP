# Example dnsmasq config for a single air-gapped server acting as DNS + DHCP.
# Copy to /etc/dnsmasq.d/10-airgap.conf, adjust, then: systemctl restart dnsmasq
#
# Every value below is a placeholder. Nothing here is safe to deploy unedited.

# --- Interface binding --------------------------------------------------------
# Serve only on the LAN interface; never answer from the outside.
interface=eth0
bind-interfaces
# Never forward queries upstream: there is no upstream in an air-gapped network.
no-resolv
no-hosts

# --- DNS ----------------------------------------------------------------------
domain=lab.local
local=/lab.local/
expand-hosts
domain-needed
bogus-priv

# Static records. Alternatively put them in /etc/hosts and drop `no-hosts` above.
address=/ns1.lab.local/10.0.0.10
address=/gw.lab.local/10.0.0.1

# --- DHCP ---------------------------------------------------------------------
dhcp-range=10.0.0.100,10.0.0.200,12h
dhcp-option=option:router,10.0.0.1
dhcp-option=option:dns-server,10.0.0.10
dhcp-option=option:ntp-server,10.0.0.10
dhcp-authoritative

# Reservations: dhcp-host=<mac>,<ip>,<hostname>
# dhcp-host=aa:bb:cc:dd:ee:ff,10.0.0.50,printer

# --- Logging ------------------------------------------------------------------
log-queries
log-dhcp
